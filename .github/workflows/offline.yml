name: offline

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material
          pip install mkdocs-awesome-nav

      - name: Build offline site
        run: |
          OFFLINE=true mkdocs build --site-dir offline-site
          cd offline-site
          zip -r ../my-docs-offline.zip .
          cd ..

      - name: Build normal GitHub Pages site
        run: |
          mkdocs build --site-dir site

      - name: Add offline zip to public site
        run: |
          mkdir -p site/downloads
          mv my-docs-offline.zip site/downloads/my-docs-offline.zip

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4